<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fortification QA Calculator | Fortify Health</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="calculator.css">
</head>
<body>
  <div class="container">
    <img src="logo.png" alt="Fortify Health Logo" class="logo">
    <h1>Fortification QA Calculator</h1>

    <!-- Premix Output Calculator Section -->
    <section class="calculator-section">
      <h2>Premix Output Calculator</h2>
      
      <label>Atta Flow Rate (kg/hr)</label>
      <input type="number" id="atta">

      <label>Premix : Dilutor Ratio (e.g. 1:4)</label>
      <input type="text" id="ratio" placeholder="e.g. 1:4">

      <label>Standard Premix Addition (g/MT)</label>
      <input type="number" id="standard">

      <label>Hopper Capacity (kg)</label>
      <input type="number" id="hopper">

      <label>Actual Output Observed (g/min) - Optional for deviation</label>
      <input type="number" id="actualOutput" placeholder="Enter to calculate deviation">

      <button onclick="calculatePremix()" class="calculate-btn">Calculate</button>

      <div class="results">
        <p><b>Premix Output:</b> <span id="output">-</span> g/min</p>
        <p><b>Premix Required:</b> <span id="required">-</span> kg/hr</p>
        <p><b>Hopper Emptying Time:</b> <span id="time">-</span></p>
        
        <hr class="divider">
        
        <p><b>Output Deviation:</b> <span id="auto-deviation">-</span> %</p>
        <p><b>Iron Level:</b> <span id="auto-iron">-</span> mg/kg</p>
        <p><b>Acceptable Range:</b> 15.12 - 20.88 mg/kg</p>
        <p><b>Calibration Requirement:</b></p>
        <div id="auto-status" class="status">-</div>
      </div>
    </section>
  </div>

<script src="calculator.js"></script>
</body>
</html>
